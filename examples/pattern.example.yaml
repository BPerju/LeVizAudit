# vizaudit-overlay pattern config -- pixel coordinates on the configured camera image,
# NOT world/robot-frame units. See CLAUDE.md's vision-only/no-FK decision.

camera_key: observation.images.top   # must match a key in the dataset's meta/info.json features

# Optional: corrects `sector` sampling for a camera that isn't perfectly top-down. 4 pixel
# points (clockwise from top-left) marking a rectangular reference region on the workspace
# surface -- use `vizaudit-calibrate` to pick these by clicking on a real frame instead of
# guessing. The corners below are an axis-aligned illustration; a genuinely tilted camera
# would produce a skewed (non-rectangular-looking) quadrilateral here. Only `sector` patterns
# are affected -- `arc`/`line` stay in raw pixel space regardless.
surface_calibration:
  corners: [[60, 40], [580, 40], [580, 440], [60, 440]]
  # aspect_ratio omitted -> derived from the corners' own average edge-length ratio

objects:
  - name: cube
    count: 12          # number of episodes this object's pattern covers; wraps if the
                        # session runs longer
    pattern:
      shape: arc                # arc | line | sector
      center: [320, 240]          # pixel xy, image center for a 640x480 camera
      radius: 150                  # pixels
      angle_start_deg: 0            # 0 = +x axis (rightward)
      angle_end_deg: 180             # 0-180 = semicircle below center; 0-360 = full circle

  - name: marble
    count: 20
    pattern:
      shape: sector                  # filled pie-slice/annular-sector -- area-uniform random
                                       # sampling across the region, not just its boundary
      center: [260, 200]               # canonical coords (surface_calibration is set above);
                                         # would be pixel coords if surface_calibration were absent
      radius: 150                       # outer radius
      inner_radius: 50                   # stay this far from center, e.g. clear of a robot base
      angle_start_deg: 0
      angle_end_deg: 180
      seed: 42                            # fixed -> reproducible point set across runs
      distribution: grid                   # grid (default, evenly spaced) | random
      border_width: 10                      # extra margin -- no points within 10px of any boundary
    orientation:              # optional -- also shows a target ORIENTATION as an arrow from
                               # the target point, for tasks where rotation diversity matters
                               # too, not just position. Cycled per-episode independently of
                               # the position pattern above (its own `count`, possibly
                               # different), so the two desync over a session instead of
                               # always pairing the same position with the same rotation.
      count: 4                  # how many distinct target angles to generate
      method: uniform             # uniform (evenly spaced, default) | random (seeded)
      angle_start_deg: 0
      angle_end_deg: 360            # 0-360 = full rotation
      seed: 7                         # "random" method only
      arrow_length: 60                 # same space as this pattern's center/radius (canonical
                                         # here, since surface_calibration is set above)

marker:
  radius_px: 10
  color_rgba: [255, 64, 64, 255]
  label: true            # draw the object name next to its target point

exclude_zones:             # scene-level, fixed obstacles avoided by sector (rejection-sampled)
                            # and validated against for arc/line (raises if violated) -- always
                            # in raw pixel space, regardless of surface_calibration
  - name: robot_base
    shape: circle           # circle is the default shape when omitted
    center: [300, 450]
    radius: 30
  - name: fixed_cup
    center: [550, 150]
    radius: 20
  - name: cable_clip          # an irregularly-shaped obstacle a circle can't approximate well
    shape: polygon
    vertices: [[40, 30], [90, 35], [80, 80], [45, 70]]
